        /* Mobile responsiveness for bottom bar */
        /* زر السلة العائم — حجم أوضح مثل التطبيقات */
        /* direction: ltr حتى لا يعكس rtl الصفحة ترتيب flex (يسار = سهم + نص، يمين = مبلغ + شارة) */
#bottom-bar .fab-inner {
	direction: ltr;
	min-height: 10px;
	padding: 8px 31px;
	border-radius: 9999px;
	box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
}
        #bottom-bar .fab-cta {
            direction: rtl;
            text-align: right;
            font-size: 18px;
            line-height: 1.2;
        }
        #bottom-bar .fab-price {
            direction: rtl;
            font-size: 20px;
            line-height: 1.2;
        }
        #bottom-bar .fab-badge {
            width: 40px;
            height: 40px;
            font-size: 17px;
        }
        #bottom-bar .fab-chevron {
            width: 26px;
            height: 26px;
        }
        #bottom-bar {
    padding-bottom: 24px; /* جرّب 24–36 حتى يرضيك */
}
        @media (max-width: 400px) {
            #bottom-bar .fab-inner {
                min-height: 54px;
                padding: 8px 31px;
            }
            #bottom-bar .fab-cta { font-size: 17px; }
            #bottom-bar .fab-price { font-size: 18px; }
            #bottom-bar .fab-badge {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
        }
        @media (max-width: 350px) {
            #bottom-bar .fab-cta { font-size: 16px; }
            #bottom-bar .fab-price { font-size: 17px; }
            #bottom-bar .fab-badge {
                width: 34px;
                height: 34px;
                font-size: 15px;
            }
        }
        /* فراغ كبير تحت نصوص الفوتر — يمدّد الصفحة للأسفل */
        .page-footer-bottom {
            padding-bottom: 9rem;
        }
        @media (min-width: 400px) {
            .page-footer-bottom {
                padding-bottom: 10rem;
            }
        }
    </style>

    <script>
        function getCart() {
            try {
                return JSON.parse(localStorage.getItem('farm_cart') || '[]');
            } catch (e) {
                return [];
            }
        }

        function saveCart(cart) {
            localStorage.setItem('farm_cart', JSON.stringify(cart));
            updateCartDisplay();
        }

        function updateCartDisplay() {
            var cart = getCart();
            var total = 0;
            var itemCount = 0;
            
            for (var i = 0; i < cart.length; i++) {
                total += cart[i].price * cart[i].quantity;
                itemCount += cart[i].quantity;
            }

            document.getElementById('cart-count-top').textContent = total.toFixed(3) + ' د.ك';
            document.getElementById('cart-total').textContent = total.toFixed(3) + ' د.ك';
            document.getElementById('item-count').textContent = itemCount;
            document.getElementById('bottom-bar').style.display = itemCount > 0 ? 'block' : 'none';
        }

        function updateQuantity(productId, productName, productPrice, productImage, productDescription, change) {
            var cart = getCart();
            var item = null;
            
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === productId) {
                    item = cart[i];
                    break;
                }
            }

            if (change > 0) {
                if (item) {
                    item.quantity += 1;
                } else {
                    cart.push({
                        id: productId,
                        name: productName,
                        price: productPrice,
                        image: productImage,
                        description: productDescription || '',
                        quantity: 1
                    });
                }
            } else if (change < 0 && item) {
                item.quantity -= 1;
                if (item.quantity <= 0) {
                    cart.splice(cart.indexOf(item), 1);
                }
            }

            saveCart(cart);
            updateProductQuantities();
        }

        function getProductQuantity(productId) {
            var cart = getCart();
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === productId) {
                    return cart[i].quantity;
                }
            }
            return 0;
        }

        function updateProductQuantities() {
            var controls = document.querySelectorAll('.quantity-control');
            for (var i = 0; i < controls.length; i++) {
                var control = controls[i];
                var productId = control.getAttribute('data-product-id');
                var qty = getProductQuantity(productId);
                var qtyElement = control.querySelector('.qty-number');
                if (qtyElement) {
                    qtyElement.textContent = qty;
                }
            }
        }

        function goToCart() {
            window.location.href = 'cart.html';
        }

        function loadProducts() {
            fetch('/api/products.json')
                .then(function(r) { return r.json(); })
                .then(function(products) {
                    var container = document.getElementById('products-container');
                    var html = '';
                    
                    for (var i = 0; i < products.length; i++) {
                        var product = products[i];
                        
                        html += '<div class="flex gap-3 py-4">';
                        // الصورة يمين
                        html += '  <div class="flex-shrink-0 w-[120px] h-[120px] rounded-[16px] overflow-hidden bg-[#f5f5f5]">';
                        html += '    <img src="' + product.image + '" alt="' + product.name + '" class="w-full h-full object-cover">';
                        html += '  </div>';
                        // النص يسار
                        html += '  <div class="flex-1 min-w-0 min-h-[120px] flex flex-col justify-between text-right">';
                        html += '    <div>';
                        html += '      <div class="text-[16px] font-extrabold text-[#000] mb-1 leading-[20px]">' + product.name + '</div>';
                        html += '      <div class="text-[12px] font-medium text-[#707070] leading-[16px]">' + product.description + '</div>';
                        html += '    </div>';
                        html += '    <div class="flex items-center justify-between gap-2 mt-2">';
                        html += '      <div class="product-price text-[16px] font-extrabold text-[#000]">' + product.price.toFixed(3) + ' د.ك</div>';
                        html += '      <button class="add-button rounded-[20px] bg-[#f5f5f5] px-[24px] py-[12px] text-[14px] font-semibold text-[#000] hover:bg-[#e8e8e8] transition" data-product-id="' + product.id + '" data-product-name="' + product.name.replace(/'/g, "&#39;") + '" data-product-price="' + product.price + '" data-product-image="' + product.image + '" data-product-description="' + encodeURIComponent(product.description || '') + '" onclick="addFirstItem(this)">إضافة</button>';
                        html += '      <div class="quantity-control bg-[#f5f5f5] rounded-[12px] px-3 py-1.5 flex items-center gap-3" data-product-id="' + product.id + '" data-product-name="' + product.name.replace(/'/g, "&#39;") + '" data-product-price="' + product.price + '" data-product-image="' + product.image + '" data-product-description="' + encodeURIComponent(product.description || '') + '" style="display: none;">';
                        html += '        <button type="button" class="text-[20px] font-bold text-[#025380] w-[20px] h-[20px] flex items-center justify-center" onclick="changeQuantity(this, -1)">−</button>';
                        html += '        <span class="qty-number text-[15px] font-bold text-[#000] min-w-[18px] text-center">0</span>';
                        html += '        <button type="button" class="text-[20px] font-bold text-[#025380] w-[20px] h-[20px] flex items-center justify-center" onclick="changeQuantity(this, 1)">+</button>';
                        html += '      </div>';
                        html += '    </div>';
                        html += '  </div>';
                        html += '</div>';
                    }
                    
                    container.innerHTML = html;
                    syncUIWithCart();
                })
                .catch(function(err) {
                    console.error('Error:', err);
                    document.getElementById('products-container').innerHTML = '<div class="text-center py-10 text-red-500">خطأ في تحميل المنتجات</div>';
                });
        }

        function addFirstItem(button) {
            var productId = button.getAttribute('data-product-id');
            var productName = button.getAttribute('data-product-name');
            var productPrice = parseFloat(button.getAttribute('data-product-price'));
            var productImage = button.getAttribute('data-product-image');
            var productDescription = '';
            try {
                productDescription = decodeURIComponent(button.getAttribute('data-product-description') || '');
            } catch (eDesc) {
                productDescription = '';
            }
            
            // إضافة للسلة
            var cart = getCart();
            cart.push({
                id: productId,
                name: productName,
                price: productPrice,
                image: productImage,
                description: productDescription,
                quantity: 1
            });
            saveCart(cart);
            
            // إخفاء زر إضافة وإظهار العداد
            button.style.display = 'none';
            var control = document.querySelector('.quantity-control[data-product-id="' + productId + '"]');
            if (control) {
                control.style.display = 'flex';
            }
            
            syncUIWithCart();
        }

        function changeQuantity(btn, change) {
            var control = btn && btn.closest ? btn.closest('.quantity-control') : null;
            if (!control) {
                return;
            }
            var productId = control.getAttribute('data-product-id');
            var productName = control.getAttribute('data-product-name');
            var productPrice = parseFloat(control.getAttribute('data-product-price'));
            var productImage = control.getAttribute('data-product-image');
            var productDescription = '';
            try {
                productDescription = decodeURIComponent(control.getAttribute('data-product-description') || '');
            } catch (eDesc2) {
                productDescription = '';
            }
            var cart = getCart();
            var item = null;
            var itemIndex = -1;
            
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === productId) {
                    item = cart[i];
                    itemIndex = i;
                    break;
                }
            }

            if (change > 0) {
                if (item) {
                    item.quantity += 1;
                } else {
                    cart.push({
                        id: productId,
                        name: productName,
                        price: productPrice,
                        image: productImage,
                        description: productDescription,
                        quantity: 1
                    });
                }
            } else if (change < 0 && item) {
                item.quantity -= 1;
                if (item.quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
            }

            saveCart(cart);
            syncUIWithCart();
        }

        function syncUIWithCart() {
            var cart = getCart();
            
            // تحديث كل منتج
            var products = document.querySelectorAll('.quantity-control, .add-button');
            var productIds = {};
            
            for (var i = 0; i < cart.length; i++) {
                productIds[cart[i].id] = cart[i].quantity;
            }
            
            var controls = document.querySelectorAll('.quantity-control');
            for (var i = 0; i < controls.length; i++) {
                var control = controls[i];
                var productId = control.getAttribute('data-product-id');
                var qty = productIds[productId] || 0;
                
                var qtyElement = control.querySelector('.qty-number');
                if (qtyElement) {
                    qtyElement.textContent = qty;
                }
                
                var button = document.querySelector('.add-button[data-product-id="' + productId + '"]');
                
                if (qty > 0) {
                    control.style.display = 'flex';
                    if (button) button.style.display = 'none';
                } else {
                    control.style.display = 'none';
                    if (button) button.style.display = 'block';
                }
                
                // ✅ السعر يبقى ثابت - ما نغيره!
                // شلنا الكود اللي كان يحدث السعر
            }
            
            updateCartDisplay();
        }

        loadProducts();
    </script>
